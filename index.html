<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Slamberz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui">
        <h1>Slamberz</h1>
        <p>Score: <b id="score">0</b></p>
    </div>

    <div id="corner-btns">
        <button id="resetBtn" title="Reset runde">↺</button>
        <button id="fullscreen-btn" title="Fuld skærm">⛶</button>
    </div>

    <div id="results">
        <div class="big" id="wonCount">0</div>
        <p>caps vendt</p>
        <div id="wonList"></div>
    </div>

    <p id="status-bar"><span id="status">Loader...</span></p>

    <div id="power-container">
        <div id="power-mask"></div>
    </div>

    <script src="three.min.js"></script>
    <script type="module" src="src/main.js"></script>
    <script>
        const btn = document.getElementById('fullscreen-btn');
        const isIOS = /iP(hone|od|ad)/.test(navigator.userAgent) ||
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isIOS) {
            btn.style.display = 'none';
        } else {
            btn.addEventListener('pointerdown', async () => {
                try {
                    if (document.fullscreenElement) {
                        await document.exitFullscreen();
                    } else {
                        await document.documentElement.requestFullscreen();
                    }
                } catch (_) {}
            });
        }
    </script>
</body>
</html>
